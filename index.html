<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./app.js" defer type="module"></script>
    <link rel="stylesheet" href="style.css">
    <title>Contatos - atividade</title>
</head>
<body>
    <main class="container">
        <article class="card-form">
            <header>
                <h1>Cadastro de Contatos</h1>
            </header>
            <form id="formContato">
                <input type="hidden" id="id">
                <section class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </section>
                <section class="campo">
                    <label for="celular">Celular</label>
                    <input type="text" id="celular" required>
                </section>
                <section class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </section>
                <section class="campo">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" required>
                </section>
                <section class="campo">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" required>
                </section>
                <!-- Preview da imagem -->
                <section class="preview-container">
                    <input id="preview-input" class="preview-input" type="file" accept="image/*" hidden>
                    <label class="preview-label" for="preview-input">
                        <img id="preview-image" class="preview-image" src="./img/upload-icon.svg" alt="Clique para enviar imagem" width="200px">
                    </label>
                </section>
                <footer class="acoes">
                    <button type="submit"> Salvar Contato</button>
                </footer>
            </form>
        </article>
        <article class="lista">
            <header>
                <h2>Lista de Contatos</h2>
            </header>
            <section id="listaContatos"></section>
        </article>
    </main>
</body>
</html>
